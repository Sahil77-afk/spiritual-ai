{% extends "base.html" %}

<div style="text-align:center;padding:5rem 1rem;">
    <div style="font-size:5rem;margin-bottom:1rem;opacity:0.4;">🙏</div>

    <a href="/" class="btn-gold" style="text-decoration:none;">
        <i class="fas fa-home"></i> Return Home
    </a>
</div>
{% endblock %}
