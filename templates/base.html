<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Spiritual AI — AI-powered guidance from the Bhagavad Gita, Holy Bible, and Holy Quran. One compassionate voice for all seekers.">
    <meta name="theme-color" content="#0F1117">
    <title>{% block title %}Spiritual AI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    {% block head %}{% endblock %}
    <style>
        :root {
            --ink:    #0F1117;
            --ink-2:  #1A1D27;
            --ink-3:  #252836;
            --gold:   #D4A853;
            --gold-2: #ECC97A;
            --mist:   rgba(255,255,255,0.05);
            --mist-2: rgba(255,255,255,0.09);
            --border: rgba(212,168,83,0.18);
            --text:   #EDE8DC;
            --muted:  rgba(237,232,220,0.45);
            --radius: 16px;
            --green:  #6DBF87;
            --blue:   #7EB8D4;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--ink);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* PRELOADER */
        #preloader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--ink);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
            transition: opacity 0.7s ease;
        }
        .pl-ring {
            width: 56px; height: 56px;
            border: 2px solid rgba(212,168,83,0.15);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pl-text { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; letter-spacing: 0.3em; }

        /* NAVBAR */
        .navbar {
            position: sticky; top: 0; z-index: 500;
            background: rgba(15,17,23,0.88) !important;
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
        }
        .navbar-brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem; font-weight: 600;
            color: var(--gold-2) !important;
            display: flex; align-items: center; gap: 8px;
        }
        .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); display: inline-block; }
        .nav-link {
            font-size: 0.85rem; color: var(--muted) !important;
            padding: 0.4rem 0.8rem !important; border-radius: 8px;
            transition: all 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .nav-link:hover { color: var(--text) !important; background: var(--mist); }
        .nav-link.active-page { color: var(--gold) !important; }
        .nav-link i { font-size: 0.75rem; }
        .navbar-toggler { border: 1px solid var(--border); padding: 5px 9px; }
        .navbar-toggler-icon { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28212,168,83,0.9%29' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e"); }

        /* PAGE */
        .page-body { position: relative; z-index: 1; min-height: calc(100vh - 65px); }
        .container { max-width: 820px; padding: 0 1.5rem; margin: 0 auto; }
        .container-wide { max-width: 1100px; padding: 0 1.5rem; margin: 0 auto; }

        /* CARDS */
        .glass-card {
            background: var(--mist);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(12px);
        }

        /* FORM ELEMENTS */
        .input-shell {
            background: var(--mist); border: 1px solid var(--border);
            border-radius: var(--radius); transition: border-color 0.25s, box-shadow 0.25s;
        }
        .input-shell:focus-within {
            border-color: rgba(212,168,83,0.5);
            box-shadow: 0 0 0 3px rgba(212,168,83,0.07);
        }
        textarea, input[type=text], input[type=email], input[type=date], input[type=number], select {
            background: transparent; border: none; outline: none;
            color: var(--text); font-family: 'DM Sans', sans-serif; width: 100%;
        }
        textarea::placeholder, input::placeholder { color: var(--muted); font-style: italic; }
        input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6) sepia(1) saturate(2) hue-rotate(5deg); }

        .btn-gold {
            background: var(--gold); color: var(--ink);
            border: none; border-radius: 10px;
            padding: 0.6rem 1.5rem;
            font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500;
            cursor: pointer; transition: all 0.25s; display: inline-flex; align-items: center; gap: 7px;
        }
        .btn-gold:hover { background: var(--gold-2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,168,83,0.22); }
        .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-ghost {
            background: var(--mist); color: var(--muted);
            border: 1px solid var(--border); border-radius: 10px;
            padding: 0.6rem 1.2rem; font-size: 0.85rem; font-weight: 400;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-ghost:hover { background: var(--mist-2); color: var(--text); }

        /* LABELS */
        .label-tag {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
            color: var(--gold); font-weight: 500; margin-bottom: 0.6rem;
        }
        .label-tag::before { content: ''; display: block; width: 16px; height: 1px; background: var(--gold); }

        /* FAITH PILLS */
        .faith-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .faith-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; background: var(--mist); border: 1px solid var(--border);
            border-radius: 100px; font-size: 0.78rem; color: var(--muted);
            transition: all 0.2s;
        }
        .faith-pill:hover { background: var(--mist-2); color: var(--text); }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-h { background: #F5A623; }
        .dot-c { background: var(--blue); }
        .dot-i { background: var(--green); }

        /* DIVIDER */
        .thin-rule { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

        /* QUOTE */
        .quote-block {
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: 1.05rem; color: var(--muted); line-height: 1.8;
            padding: 1.2rem 1.4rem; border-left: 2px solid rgba(212,168,83,0.4);
            background: rgba(212,168,83,0.03); border-radius: 0 8px 8px 0;
        }

        /* DISCLAIMER */
        .disclaimer {
            display: flex; gap: 12px;
            background: rgba(212,168,83,0.04); border: 1px solid rgba(212,168,83,0.15);
            border-radius: 12px; padding: 1rem 1.2rem;
        }
        .disclaimer h5 { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
        .disclaimer p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

        /* ANIMATIONS */
        @keyframes rise { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .rise { opacity: 0; animation: rise 0.6s ease forwards; }
        .rise-1 { animation-delay: 0.1s; }
        .rise-2 { animation-delay: 0.25s; }
        .rise-3 { animation-delay: 0.4s; }
        .rise-4 { animation-delay: 0.55s; }
        .rise-5 { animation-delay: 0.7s; }

        /* FOOTER */
        .site-footer {
            position: relative; z-index: 1;
            border-top: 1px solid var(--border);
            padding: 1.25rem 2rem; text-align: center;
            font-size: 0.78rem; color: var(--muted); letter-spacing: 0.04em;
        }

        /* AUDIO BTN */
        #audioBtn {
            position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999;
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--ink-2); border: 1px solid var(--border);
            color: var(--gold); font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s; backdrop-filter: blur(12px);
        }
        #audioBtn:hover { background: var(--ink-3); border-color: rgba(212,168,83,0.5); transform: scale(1.05); }

        /* PAGE HERO */
        .page-hero { padding: 3rem 0 1.5rem; text-align: center; }
        .page-hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 5vw, 3rem); font-weight: 300;
            color: var(--text); margin-bottom: 0.5rem;
        }
        .page-hero h1 em { font-style: italic; color: var(--gold-2); }
        .page-hero p { color: var(--muted); font-size: 0.95rem; }

        /* STYLED INPUTS */
        .styled-input {
            background: var(--mist); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.75rem 1rem;
            color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
            width: 100%; transition: border-color 0.2s;
        }
        .styled-input:focus { outline: none; border-color: rgba(212,168,83,0.5); }
        .styled-label { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }

        @media (max-width: 600px) {
            .container { padding: 0 1rem; }
            .page-hero { padding: 2rem 0 1rem; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- Preloader -->
<div id="preloader">
    <div class="pl-ring"></div>
    <p class="pl-text">Awakening</p>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div style="max-width:100%;padding:0;width:100%;display:flex;align-items:center;">
        <a class="navbar-brand me-3" href="/">
            <span class="brand-dot"></span> Spiritual AI
        </a>
        <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-1 align-items-center">
                <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/journal"><i class="fas fa-book"></i> Journal</a></li>
                <li class="nav-item"><a class="nav-link" href="/horoscope"><i class="fas fa-star"></i> Horoscope</a></li>
                <li class="nav-item"><a class="nav-link" href="/numerology"><i class="fas fa-infinity"></i> Numerology</a></li>
                <li class="nav-item"><a class="nav-link" href="/meditation"><i class="fas fa-spa"></i> Meditation</a></li>
                <li class="nav-item"><a class="nav-link" href="/pomodoro"><i class="fas fa-clock"></i> Pomodoro</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact"><i class="fas fa-envelope"></i> Contact</a></li>
                
            </ul>
        </div>
    </div>
</nav>

<div class="page-body">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</div>

<footer class="site-footer">
    Spiritual AI &nbsp;·&nbsp; Wisdom from all paths, for all people &nbsp;·&nbsp;
    <span style="color:var(--gold)">✦</span>
</footer>

<audio id="bgm" loop>
    <source src="{{ url_for('static', filename='BGM.mp3') }}" type="audio/mpeg">
</audio>
<button id="audioBtn" title="Toggle ambient music"><i class="fas fa-music"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

<script>
// Particle background
(function(){
    const c = document.getElementById('bg-canvas');
    const ctx = c.getContext('2d');
    let W, H, pts = [];
    function resize(){ W = c.width = innerWidth; H = c.height = innerHeight; }
    function init(){
        pts = [];
        const n = Math.floor(W*H/20000);
        for(let i=0;i<n;i++) pts.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.2+0.2, a:Math.random()*Math.PI*2, s:Math.random()*0.12+0.04, d:(Math.random()-.5)*0.07});
    }
    function draw(){
        ctx.clearRect(0,0,W,H);
        pts.forEach(p=>{
            p.y-=p.s; p.x+=p.d; p.a+=0.004;
            if(p.y<-5){ p.y=H+5; p.x=Math.random()*W; }
            const al=(Math.sin(p.a)*.5+.5)*.4+.08;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(212,168,83,${al})`; ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    resize(); init(); draw();
    window.addEventListener('resize',()=>{ resize(); init(); });
})();

// Preloader
window.addEventListener('load',()=>{
    const pre = document.getElementById('preloader');
    pre.style.opacity='0';
    setTimeout(()=>pre.style.display='none', 700);
});

// BGM
const bgm = document.getElementById('bgm');
const ab = document.getElementById('audioBtn');
let playing = false;
ab.addEventListener('click',()=>{
    if(playing){ bgm.pause(); ab.innerHTML='<i class="fas fa-music"></i>'; ab.style.opacity='.5'; playing=false; }
    else { bgm.play().catch(()=>{}); ab.innerHTML='<i class="fas fa-pause"></i>'; ab.style.opacity='1'; playing=true; }
});
document.addEventListener('click', function auto(e){
    if(e.target.closest('#audioBtn')) return;
    bgm.play().then(()=>{ playing=true; ab.innerHTML='<i class="fas fa-pause"></i>'; }).catch(()=>{});
    document.removeEventListener('click', auto);
}, {once:true});

// Active nav
document.querySelectorAll('.nav-link').forEach(l=>{
    if(l.href === location.href) l.classList.add('active-page');
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
